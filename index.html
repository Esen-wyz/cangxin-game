<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>苍心 · 气功对决</title>
<style>
:root{--bg:#0a0a14;--surf:#141428;--gold:#c9a96e;--gol2:#e0c78a;--txt:#d5cfc0;--dim:#8888a0;--dan:#c0392b;--p2:#f1c40f;--p3:#e056a0}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:"PingFang SC","Microsoft YaHei",sans-serif;background:var(--bg);color:var(--txt);height:100vh;display:flex;justify-content:center;align-items:center;overflow:hidden;user-select:none;-webkit-user-select:none}
#game{width:100%;max-width:480px;height:100vh;display:flex;flex-direction:column;position:relative}
#topbar{display:flex;align-items:center;justify-content:space-between;padding:5px 10px;gap:4px;z-index:5;background:rgba(10,10,20,0.95)}
#topbar h1{font-size:1.15em;background:linear-gradient(180deg,var(--gol2),var(--gold));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;white-space:nowrap}
#phase-tag{font-size:0.6em;padding:2px 6px;border-radius:4px;font-weight:bold;white-space:nowrap}
#phase-tag.p1{background:rgba(201,169,110,0.12);color:var(--gold);border:1px solid rgba(201,169,110,0.25)}
#phase-tag.p2{background:rgba(241,196,15,0.12);color:var(--p2);border:1px solid rgba(241,196,15,0.25)}
#phase-tag.p3{background:rgba(224,86,160,0.12);color:var(--p3);border:1px solid rgba(224,86,160,0.25)}
#scoredisp{display:flex;align-items:center;gap:3px;font-size:0.7em}
#scoredisp .sc{font-weight:bold;color:var(--gol2);font-size:1.15em}
#scoredisp .vs{color:var(--dim);font-size:0.6em}
#round-info{font-size:0.55em;color:var(--dim);text-align:center;padding:1px 0;z-index:5}
#turn-info{position:absolute;top:4px;left:50%;transform:translateX(-50%);font-size:0.5em;color:var(--dim);z-index:21;pointer-events:none}

/* Canvas arena */
#arena-wrap{flex:1;position:relative;overflow:hidden;min-height:260px}
#arena-canvas{position:absolute;top:0;left:0;width:100%;height:100%}
#result-pop{position:absolute;top:30%;left:50%;transform:translate(-50%,-50%);z-index:22;pointer-events:none;font-weight:bold;font-size:1em;text-align:center;opacity:0;transition:all 0.3s;text-shadow:0 0 12px rgba(0,0,0,0.9)}
#result-pop.show{opacity:1}
#result-pop.win{color:#2ecc71;text-shadow:0 0 18px rgba(46,204,113,0.7)}
#result-pop.lose{color:#e74c3c;text-shadow:0 0 18px rgba(231,76,60,0.7)}
#result-pop.tie{color:var(--gold)}

/* Cards */
#card-area{background:var(--surf);padding:5px;border-top:1px solid rgba(255,255,255,0.06);z-index:5}
#card-tabs{display:flex;gap:3px;justify-content:center;margin-bottom:3px}
#card-tabs .ctab{padding:3px 7px;border-radius:5px;border:1px solid rgba(255,255,255,0.08);background:transparent;color:var(--dim);font-size:0.58em;cursor:pointer;font-family:inherit}
#card-tabs .ctab.on{background:rgba(201,169,110,0.1);border-color:var(--gold);color:var(--gold)}
#card-tabs .ctab.p2tab.on{background:rgba(241,196,15,0.1);border-color:var(--p2);color:var(--p2)}
#card-tabs .ctab.p3tab.on{background:rgba(224,86,160,0.1);border-color:var(--p3);color:var(--p3)}
#cards-row{display:flex;gap:3px;justify-content:center;flex-wrap:wrap}
.card{width:58px;padding:5px 2px;border-radius:7px;border:2px solid rgba(255,255,255,0.07);background:rgba(16,16,32,0.92);color:var(--txt);cursor:pointer;font-size:0.58em;font-weight:bold;font-family:inherit;transition:all 0.1s;text-align:center;display:flex;flex-direction:column;align-items:center;gap:1px}
.card:active:not(:disabled){transform:scale(0.9)}
.card:disabled{opacity:0.25;cursor:not-allowed;filter:grayscale(0.5)}
.card .cicon{font-size:1.35em;line-height:1}
.card .cname{font-size:0.82em}
.card .ccost{font-size:0.6em;opacity:0.7}
.card .ccharge{font-size:0.56em;color:#f39c12;font-weight:bold}
.card.charge{border-color:rgba(46,204,113,0.35)}.card.charge:not(:disabled):hover{background:rgba(46,204,113,0.08)}
.card.shield{border-color:rgba(52,152,219,0.35)}.card.shield:not(:disabled):hover{background:rgba(52,152,219,0.08)}
.card.flyshield{border-color:rgba(100,220,200,0.35)}.card.flyshield:not(:disabled):hover{background:rgba(100,220,200,0.08)}
.card.attack{border-color:rgba(231,76,60,0.2)}.card.attack:not(:disabled):hover{background:rgba(231,76,60,0.06)}
.card.p2card:not(:disabled){border-color:rgba(241,196,15,0.35);box-shadow:0 0 4px rgba(241,196,15,0.07)}
.card.p3card:not(:disabled){border-color:rgba(224,86,160,0.35);box-shadow:0 0 4px rgba(224,86,160,0.07)}

/* Overlay / Setup */
#overlay{position:fixed;inset:0;background:rgba(0,0,0,0.82);display:flex;justify-content:center;align-items:center;z-index:100;backdrop-filter:blur(4px)}
#overlay.hidden{display:none}
#overlay-box{background:var(--surf);border-radius:16px;border:2px solid var(--gold);padding:20px 14px;text-align:center;max-width:340px;width:90%;max-height:82vh;overflow-y:auto;animation:popIn 0.35s ease-out}
@keyframes popIn{0%{transform:scale(0.5);opacity:0}100%{transform:scale(1);opacity:1}}
#overlay-box h2{font-size:1.25em;color:var(--gol2);margin-bottom:3px}
#overlay-box .phase-result{font-size:0.65em;color:var(--dim);margin-bottom:3px}
#overlay-box .winner-text{font-size:0.78em;color:var(--txt);margin-bottom:10px;line-height:1.4;white-space:pre-line}
#overlay-box button{padding:8px 16px;font-size:0.8em;font-weight:bold;border:none;border-radius:16px;cursor:pointer;font-family:inherit;margin:2px 3px}
#overlay-box .btn-primary{background:linear-gradient(135deg,var(--gold),#a08040);color:#1a1a14}
#overlay-box .btn-secondary{background:transparent;border:1px solid var(--gold);color:var(--gold)}

#setup{position:fixed;inset:0;background:var(--bg);display:flex;justify-content:center;align-items:center;z-index:300;flex-direction:column;gap:14px}
#setup.hidden{display:none}
#setup h1{font-size:2.5em;background:linear-gradient(180deg,var(--gol2),var(--gold));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
#setup .win-options{display:flex;gap:6px}
#setup .win-opt{padding:10px 14px;border-radius:10px;border:2px solid rgba(255,255,255,0.1);background:var(--surf);color:var(--txt);cursor:pointer;font-size:0.9em;font-weight:bold;font-family:inherit}
#setup .win-opt.sel{border-color:var(--gold);background:rgba(201,169,110,0.08);color:var(--gol2)}
#setup .start-btn{padding:10px 28px;border-radius:16px;border:none;background:linear-gradient(135deg,var(--gold),#a08040);color:#1a1a14;font-size:0.95em;font-weight:bold;cursor:pointer;font-family:inherit}
#rules-btn{position:fixed;top:4px;right:4px;width:24px;height:24px;border-radius:50%;border:1px solid rgba(255,255,255,0.1);background:var(--surf);color:var(--dim);font-size:0.7em;cursor:pointer;z-index:50;display:flex;align-items:center;justify-content:center}
#rules-modal{position:fixed;inset:0;background:rgba(0,0,0,0.8);display:flex;justify-content:center;align-items:center;z-index:200;backdrop-filter:blur(4px)}
#rules-modal.hidden{display:none}
#rules-box{background:var(--surf);border-radius:12px;border:1px solid rgba(201,169,110,0.3);padding:12px;max-width:360px;width:92%;max-height:76vh;overflow-y:auto;font-size:0.65em;line-height:1.35}
#rules-box h3{color:var(--gold);text-align:center;margin-bottom:4px}
#rules-box .rule-group{margin-bottom:4px;color:var(--dim)}
#rules-box .rule-group h4{color:var(--gol2);font-size:0.9em}
#rules-box .close-btn{display:block;margin:6px auto 0;padding:4px 14px;border-radius:10px;border:1px solid var(--gold);background:transparent;color:var(--gold);cursor:pointer;font-family:inherit}
.replay-phase{margin:5px 0;padding:5px;border-radius:6px;background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.04)}
.replay-phase h4{color:var(--gold);font-size:0.75em}.replay-round{font-size:0.62em;color:var(--dim)}.replay-round .r-win{color:#2ecc71}.replay-round .r-lose{color:var(--dan)}
.replay-final{text-align:center;font-size:0.8em;color:var(--gol2);font-weight:bold;margin:4px 0}
.egy-disp{font-size:0.55em;color:var(--dim);position:absolute;text-align:center;pointer-events:none}
#player-egy-disp{bottom:2px;left:8px}#enemy-egy-disp{bottom:2px;right:8px}
</style>
</head>
<body>

<div id="setup">
  <h1>苍 心</h1><div style="color:var(--dim)">气 功 对 决</div>
  <div style="color:var(--dim);margin-top:4px">选择每阶段获胜局数</div>
  <div class="win-options" id="win-options">
    <button class="win-opt" data-wins="1">1局制</button>
    <button class="win-opt sel" data-wins="3">3局制</button>
    <button class="win-opt" data-wins="2">2局制</button>
  </div>
  <button class="start-btn" id="start-game-btn">开始对决</button>
</div>

<div id="game">
  <div id="topbar">
    <h1>苍 心</h1>
    <div id="phase-tag" class="p1">⚔ 第一阶段</div>
    <div id="scoredisp"><span class="sc" id="pscore">0</span><span class="vs">:</span><span class="sc" id="cscore">0</span></div>
  </div>
  <div id="round-info"></div>
  <div id="arena-wrap">
    <canvas id="arena-canvas"></canvas>
    <div id="result-pop"></div>
    <div class="egy-disp" id="player-egy-disp">⚡0</div>
    <div class="egy-disp" id="enemy-egy-disp">⚡0</div>
  </div>
  <div id="card-area">
    <div id="card-tabs"></div>
    <div id="cards-row"></div>
  </div>
</div>

<div id="overlay" class="hidden"><div id="overlay-box"></div></div>
<button id="rules-btn">?</button>
<div id="rules-modal" class="hidden"><div id="rules-box">
  <h3>📜 规则</h3>
  <div class="rule-group"><h4>⚔ 第一阶段</h4>各6招，先赢N局胜出。</div>
  <div class="rule-group"><h4>☯苍心(免费)</h4>+1能，被攻击即败。</div>
  <div class="rule-group"><h4>🛡护盾(免费)</h4>挡波波/天马/冰雕/朝翅。六电(-1能)。不挡搓搓/八嘎以上。</div>
  <div class="rule-group"><h4>💨波波＜⚡六电＜🔥搓搓＜💀八嘎</h4></div>
  <div class="rule-group"><h4>🌟P2（P1赢家）</h4>🦄天马(-1)威力=六电。🌟转转拳(-3)威力=八嘎。</div>
  <div class="rule-group"><h4>💥P3（P2赢家）</h4>❄冰雕(1能3次)。🦅朝翅(-1)威力=搓搓。❄🦅冰雕朝翅(-2)威力=八嘎。💥冰雕朝翅飞(-3)威力>八嘎。🕊飞飞仅六电能击落。</div>
  <button class="close-btn" id="rules-close">知道了</button>
</div></div>

<script>
(function(){
const $=s=>document.querySelector(s),$$=s=>document.querySelectorAll(s);

// ═══════════ GAME DATA ═══════════
const BASE_MOVES={
  '苍心':{type:'charge',cost:0,power:0,icon:'☯',anim:'charge'},
  '护盾':{type:'shield',cost:0,power:0,icon:'🛡',anim:'shield'},
  '波波':{type:'attack',cost:1,power:1,icon:'💨',anim:'wave',shieldResult:'blocked'},
  '六电':{type:'attack',cost:2,power:2,icon:'⚡',anim:'bolt',shieldResult:'energyLoss'},
  '搓搓':{type:'attack',cost:3,power:3,icon:'🔥',anim:'fire',shieldResult:'pierce'},
  '八嘎':{type:'attack',cost:4,power:4,icon:'💀',anim:'dark',shieldResult:'pierce'},
};
const PHASE2_BONUS={
  '天马':{type:'attack',cost:1,power:2,icon:'🦄',anim:'pegasus',shieldResult:'blocked',bonus:true,phase:2},
  '天马流星转转拳':{type:'attack',cost:3,power:4,icon:'🌟',anim:'meteor',shieldResult:'pierce',bonus:true,phase:2},
};
const PHASE3_BONUS={
  '冰雕':{type:'attack',cost:0,power:0,icon:'❄',anim:'ice',shieldResult:'blocked',bonus:true,phase:3,chargeCost:1,chargesPerPay:3},
  '朝翅':{type:'attack',cost:1,power:3,icon:'🦅',anim:'wing',shieldResult:'blocked',bonus:true,phase:3},
  '冰雕朝翅':{type:'attack',cost:2,power:4,icon:'❄🦅',anim:'icewing',shieldResult:'pierce',bonus:true,phase:3},
  '冰雕朝翅飞':{type:'attack',cost:3,power:5,icon:'💥',anim:'ult',shieldResult:'pierce',bonus:true,phase:3},
  '飞飞':{type:'flyshield',cost:0,power:0,icon:'🕊',anim:'fly',bonus:true,phase:3},
};

let winsPerPhase=3,selectedWins=3;
let state={currentPhase:1,phase1Winner:null,phase2Winner:null,phase1PlayerScore:0,phase1ComputerScore:0,phase2PlayerScore:0,phase2ComputerScore:0,playerEnergy:0,computerEnergy:0,playerScore:0,computerScore:0,currentRound:1,turnInRound:0,gameOver:false,awaitingPlayer:true,playerMove:null,computerMove:null,lastResult:null,playerBingdiaoCharges:0,computerBingdiaoCharges:0};
let playerHistory=[],aiMood=0.5,gameHistory={winsPerPhase:3,phases:[]},currentPhaseHistory=null;
let activeTab='base',movesNeedRebuild=true;

function getPlayerMoves(){let m={...BASE_MOVES};if(state.currentPhase>=2&&state.phase1Winner==='player')Object.assign(m,PHASE2_BONUS);if(state.currentPhase>=3&&state.phase2Winner==='player')Object.assign(m,PHASE3_BONUS);return m}
function getComputerMoves(){let m={...BASE_MOVES};if(state.currentPhase>=2&&state.phase1Winner==='computer')Object.assign(m,PHASE2_BONUS);if(state.currentPhase>=3&&state.phase2Winner==='computer')Object.assign(m,PHASE3_BONUS);return m}

// ═══════════ CANVAS SETUP ═══════════
const canvas=$('#arena-canvas'),ctx=canvas.getContext('2d');
let W,H;

function resizeCanvas(){
  const wrap=$('#arena-wrap'),r=wrap.getBoundingClientRect();
  W=canvas.width=r.width*2;H=canvas.height=r.height*2;
  canvas.style.width=r.width+'px';canvas.style.height=r.height+'px';
  ctx.scale(2,2);W/=2;H/=2;
}
window.addEventListener('resize',resizeCanvas);

// ═══════════ PARTICLES ═══════════
let particles=[],projectiles=[],impacts=[],screenShake=0,flashAlpha=0,flashColor='';

function spawnParticles(x,y,color,count,spd,life){
  for(let i=0;i<count;i++){
    const a=Math.random()*Math.PI*2,s=(Math.random()*spd||3)+1;
    particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:life||0.6,ml:life||0.6,color,size:Math.random()*3+1.5});
  }
}
function spawnProjectile(x,y,tx,ty,color,size,trail){
  projectiles.push({x,y,tx,ty,color,size:size||6,trail:trail||color,progress:0,speed:0.06+Math.random()*0.02});
}
function addImpact(x,y,color,size){impacts.push({x,y,color,size:size||40,life:0.4,ml:0.4});}
function addShake(amt){screenShake=Math.max(screenShake,amt);}
function addFlash(color,alpha){flashAlpha=alpha||0.4;flashColor=color;}

// ═══════════ DRAW SHADOW FIGHTER (Shadow Fight style) ═══════════
function drawShadowFighter(cx,cy,facing,glowColor,state){
  const f=facing,flip=x=>cx+f*x,s=state||{};
  ctx.save();
  // Glow layer (drawn first = behind)
  const glowGrad=ctx.createRadialGradient(cx,cy-10,10,cx,cy-10,65);
  glowGrad.addColorStop(0,glowColor.replace('1)','0.25)').replace('rgb','rgba'));
  glowGrad.addColorStop(1,'transparent');
  ctx.fillStyle=glowGrad;ctx.beginPath();ctx.arc(cx,cy,55,0,Math.PI*2);ctx.fill();

  // Ground shadow
  ctx.fillStyle='rgba(0,0,0,0.4)';ctx.beginPath();ctx.ellipse(cx,cy+58,24,4,0,0,Math.PI*2);ctx.fill();

  // Body drawing function (silhouette)
  function drawBody(isEnemy){
    // LEGS
    const ls=s.kicking?16:7;
    ctx.fillStyle='#111';ctx.strokeStyle=glowColor;ctx.lineWidth=1.5;
    // Back leg
    ctx.beginPath();ctx.roundRect(flip(-ls-3),cy+30,10,26,4);ctx.fill();ctx.stroke();
    ctx.beginPath();ctx.roundRect(flip(-ls-5),cy+52,12,6,3);ctx.fill();ctx.stroke();
    // Front leg
    ctx.beginPath();ctx.roundRect(flip(ls-2),cy+32,10,24,4);ctx.fill();ctx.stroke();
    ctx.beginPath();ctx.roundRect(flip(ls-4),cy+52,12,6,3);ctx.fill();ctx.stroke();

    // TORSO - trapezoid
    ctx.beginPath();ctx.moveTo(flip(-17),cy-6);ctx.lineTo(flip(17),cy-6);ctx.lineTo(flip(15),cy+26);ctx.lineTo(flip(-15),cy+26);ctx.closePath();ctx.fill();ctx.stroke();
    // Belt
    ctx.beginPath();ctx.roundRect(flip(-16),cy+20,32,6,3);ctx.fillStyle='#0a0a0a';ctx.fill();ctx.stroke();
    // Belt knot
    ctx.beginPath();ctx.roundRect(flip(-3),cy+18,8,10,2);ctx.fill();ctx.stroke();
    ctx.fillStyle='#111';

    // BACK ARM
    ctx.save();ctx.translate(flip(-13),cy-4);ctx.rotate(f*0.45);ctx.beginPath();ctx.roundRect(-5,0,10,22,4);ctx.fill();ctx.stroke();ctx.restore();
    // Back fist
    ctx.beginPath();ctx.arc(flip(-13)+f*Math.sin(0.45)*22,cy-4+Math.cos(0.45)*22,7,0,Math.PI*2);ctx.fill();ctx.stroke();

    // FRONT ARM (punching arm)
    ctx.save();ctx.translate(flip(11),cy-2);
    const aRot=s.punching?f*(-1.0):f*(-0.3);
    ctx.rotate(aRot);
    ctx.beginPath();ctx.roundRect(-5,0,10,24,4);ctx.fill();ctx.stroke();
    ctx.restore();
    // Front fist
    const fx=flip(11)+f*Math.sin(aRot||-0.3)*24,fy=cy-2+Math.cos(aRot||-0.3)*24;
    ctx.beginPath();ctx.arc(fx,fy,s.punching?8:7,0,Math.PI*2);ctx.fill();ctx.stroke();

    // NECK
    ctx.beginPath();ctx.roundRect(flip(-5),cy-14,10,10,3);ctx.fill();ctx.stroke();

    // HEAD
    ctx.beginPath();ctx.arc(cx,cy-24,16,0,Math.PI*2);ctx.fill();ctx.stroke();
    // Hair spikes
    ctx.beginPath();ctx.moveTo(flip(-15),cy-28);ctx.lineTo(flip(-12),cy-42);ctx.lineTo(flip(-4),cy-30);ctx.fill();ctx.stroke();
    ctx.beginPath();ctx.moveTo(flip(-2),cy-30);ctx.lineTo(flip(0),cy-44);ctx.lineTo(flip(6),cy-30);ctx.fill();ctx.stroke();
    ctx.beginPath();ctx.moveTo(flip(4),cy-30);ctx.lineTo(flip(12),cy-40);ctx.lineTo(flip(15),cy-28);ctx.fill();ctx.stroke();
    // Headband tails
    ctx.strokeStyle=glowColor;ctx.lineWidth=2;
    ctx.beginPath();ctx.moveTo(flip(-16),cy-28);ctx.quadraticCurveTo(flip(-22),cy-20,flip(-18),cy-14);ctx.stroke();
    ctx.beginPath();ctx.moveTo(flip(16),cy-28);ctx.quadraticCurveTo(flip(22),cy-20,flip(18),cy-14);ctx.stroke();
    ctx.strokeStyle=glowColor;ctx.lineWidth=1.5;

    // GLOWING EYES
    ctx.fillStyle='#fff';ctx.shadowColor=glowColor;ctx.shadowBlur=8;
    ctx.beginPath();ctx.arc(flip(-6),cy-26,2.5,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(flip(6),cy-26,2.5,0,Math.PI*2);ctx.fill();
    ctx.shadowBlur=0;

    // Mouth
    if(s.dead){
      ctx.strokeStyle=glowColor;ctx.beginPath();ctx.arc(cx,cy-18,5,0,Math.PI);ctx.stroke();
    }else if(s.hit){
      ctx.fillStyle='#fff';ctx.shadowColor='#f00';ctx.shadowBlur=6;
      ctx.beginPath();ctx.arc(cx,cy-18,5,0,Math.PI*2);ctx.fill();ctx.shadowBlur=0;
    }
  }

  drawBody(false);

  // Second glow pass for intense states
  if(s.hit){
    ctx.fillStyle=glowColor.replace('1)','0.3)').replace('rgb','rgba');
    ctx.beginPath();ctx.arc(cx,cy-10,45,0,Math.PI*2);ctx.fill();
  }

  ctx.restore();
}

// ═══════════ ANIMATION STATE ═══════════
let pAnim={x:0,y:0,state:{}},eAnim={x:0,y:0,state:{}};
let animTime=0,animPhase='idle'; // idle|active|result

function resetCharPositions(){
  const marginX=W*0.2,marginY=H*0.55;
  pAnim={x:marginX,y:marginY,state:{}};
  eAnim={x:W-marginX,y:marginY,state:{}};
}
function getCharPositions(){resetCharPositions();}

// idle breathing
function updateIdleAnims(dt){
  animTime+=dt;
  if(animPhase==='idle'){
    pAnim.y+=Math.sin(animTime*3)*0.2;
    eAnim.y+=Math.sin(animTime*3+1)*0.2;
  }
}

// ═══════════ RENDER LOOP ═══════════
function renderFrame(){
  ctx.clearRect(0,0,W,H);

  // Background
  const bgGrad=ctx.createLinearGradient(0,0,0,H);
  bgGrad.addColorStop(0,'#1a1a35');bgGrad.addColorStop(0.4,'#141428');bgGrad.addColorStop(1,'#1a0a10');
  ctx.fillStyle=bgGrad;ctx.fillRect(0,0,W,H);

  // Ground
  ctx.fillStyle='rgba(201,169,110,0.08)';ctx.fillRect(0,H*0.82,W,1.5);
  ctx.fillStyle='rgba(255,255,255,0.02)';ctx.fillRect(0,H*0.82-1,W,0.5);

  // Screen shake offset
  const sx=(Math.random()-0.5)*screenShake*2,sy=(Math.random()-0.5)*screenShake*2;
  ctx.save();ctx.translate(sx,sy);

  // Draw fighters
  drawShadowFighter(pAnim.x,pAnim.y,1,'rgb(68,170,255)',pAnim.state);
  drawShadowFighter(eAnim.x,eAnim.y,-1,'rgb(255,80,80)',eAnim.state);

  // Particles
  for(const p of particles){
    const prog=1-(p.life/p.ml);
    ctx.globalAlpha=p.life/p.ml;
    ctx.fillStyle=p.color;ctx.beginPath();ctx.arc(p.x,p.y,p.size*ctx.globalAlpha,0,Math.PI*2);ctx.fill();
  }
  // Projectiles
  for(const p of projectiles){
    const px=p.x+(p.tx-p.x)*p.progress,py=p.y+(p.ty-p.y)*p.progress;
    ctx.globalAlpha=1;
    // Trail
    for(let i=0;i<3;i++){
      const tp=p.progress-i*0.08;if(tp<0)continue;
      const tpx=p.x+(p.tx-p.x)*tp,tpy=p.y+(p.ty-p.y)*tp;
      ctx.fillStyle=p.trail;ctx.globalAlpha=(1-tp)*0.3;
      ctx.beginPath();ctx.arc(tpx,tpy,p.size*(0.5+i*0.2),0,Math.PI*2);ctx.fill();
    }
    // Main
    ctx.fillStyle=p.color;ctx.globalAlpha=1;
    ctx.beginPath();ctx.arc(px,py,p.size*1.5,0,Math.PI*2);ctx.fill();
    // Glow
    ctx.fillStyle='#fff';ctx.globalAlpha=0.6;
    ctx.beginPath();ctx.arc(px,py,p.size*0.6,0,Math.PI*2);ctx.fill();
  }
  // Impacts
  for(const imp of impacts){
    const prog=1-(imp.life/imp.ml);
    ctx.globalAlpha=prog<0.3?prog/0.3:1;
    const r=imp.size*(1+prog*1.5);
    ctx.strokeStyle=imp.color;ctx.lineWidth=4*(1-prog);
    ctx.beginPath();ctx.arc(imp.x,imp.y,r,0,Math.PI*2);ctx.stroke();
    // Inner flash
    ctx.fillStyle=imp.color;ctx.globalAlpha=(1-prog)*0.4;
    ctx.beginPath();ctx.arc(imp.x,imp.y,r*0.5,0,Math.PI*2);ctx.fill();
  }
  ctx.globalAlpha=1;

  // Screen flash
  if(flashAlpha>0){
    ctx.fillStyle=flashColor;ctx.globalAlpha=flashAlpha;ctx.fillRect(0,0,W,H);ctx.globalAlpha=1;
  }

  ctx.restore();
}

// ═══════════ UPDATE ═══════════
let lastTime=0;
function gameLoop(t){
  if(lastTime===0)lastTime=t;
  const dt=Math.min((t-lastTime)/1000,0.1);lastTime=t;

  updateIdleAnims(dt);

  // Update particles
  for(const p of particles){p.x+=p.vx*dt*60;p.y+=p.vy*dt*60;p.life-=dt;p.vy+=dt*20;}
  particles=particles.filter(p=>p.life>0);

  // Update projectiles
  for(const p of projectiles){p.progress+=p.speed*dt*60;if(p.progress>=1){addImpact(p.tx,p.ty,p.color,35);spawnParticles(p.tx,p.ty,p.color,12,4,0.4)}}
  projectiles=projectiles.filter(p=>p.progress<1);

  // Update impacts
  for(const i of impacts)i.life-=dt;
  impacts=impacts.filter(i=>i.life>0);

  // Decay effects
  screenShake*=0.85;if(screenShake<0.1)screenShake=0;
  flashAlpha*=0.9;if(flashAlpha<0.01)flashAlpha=0;

  renderFrame();
  requestAnimationFrame(gameLoop);
}

function triggerAnim(pMove,cMove,result){

  // Reset
  pAnim.state={};eAnim.state={};
  animPhase='active';

    // Player

      pAnim.state.punching=true;
      const emitX=pAnim.x+30,emitY=pAnim.y;
      const hitX=eAnim.x-20,hitY=eAnim.y-5;

    }

    if(cI.type==='charge'){spawnParticles(eAnim.x,eAnim.y,'#e74c3c',20,5,0.8);addImpact(eAnim.x,eAnim.y-20,'#e74c3c',20)}

      const emitX=eAnim.x-30,emitY=eAnim.y;
      const hitX=pAnim.x+20,hitY=pAnim.y-5;
      const colors={wave:'#5dade2',bolt:'#f4d03f',fire:'#e74c3c',dark:'#8e44ad',pegasus:'#f1c40f',meteor:'#f39c12',ice:'#85c1e9',wing:'#e67e22',icewing:'#bb8fce',ult:'#e056a0'};
      const c=colors[cI.anim]||'#fff';
      spawnProjectile(emitX,emitY,hitX,hitY,c,7,c);
      addShake(cI.power>=4?10:cI.power>=3?5:2);
    }
  },100);

  // Results
  setTimeout(()=>{
    if(result.playerDefeated){
      pAnim.state.hit=true;pAnim.state.dead=true;
      addImpact(pAnim.x,pAnim.y,result.computerDefeated?'#fff':'#e74c3c',45);
      spawnParticles(pAnim.x,pAnim.y,'#e74c3c',25,6,0.7);
      addShake(12);addFlash('#f00',0.25);
    }
    if(result.computerDefeated){
      eAnim.state.hit=true;eAnim.state.dead=true;
      addImpact(eAnim.x,eAnim.y,'#fff',45);
      spawnParticles(eAnim.x,eAnim.y,'#f1c40f',25,6,0.7);
      addShake(12);addFlash('#fff',0.3);
    }
  },400);

  // Reset anim states
  setTimeout(()=>{
    pAnim.state={...pAnim.state,hit:false,punching:false,kicking:false};
    eAnim.state={...eAnim.state,hit:false,punching:false,kicking:false};
    if(!result.playerDefeated&&!result.computerDefeated){pAnim.state={};eAnim.state={}}
    animPhase='idle';
  },900);

  // Show result text
  setTimeout(()=>{
    const rp=$('#result-pop');rp.textContent=result.description;rp.className='show';
    if(result.playerDefeated)rp.classList.add('lose');
    else if(result.computerDefeated)rp.classList.add('win');
    else rp.classList.add('tie');
    setTimeout(()=>rp.className='',1200);
  },500);
}

// ═══════════ GAME LOGIC ═══════════
function resolveTurn(pMove,cMove){
  const pM=getPlayerMoves(),cM=getComputerMoves();
  const r={playerEnergyDelta:0,computerEnergyDelta:0,playerDefeated:false,computerDefeated:false,description:''};
  const pI=pM[pMove],cI=cM[cMove],pAtk=pI.type==='attack',cAtk=cI.type==='attack';
  const pCx=pMove==='苍心',cCx=cMove==='苍心',pSh=pMove==='护盾',cSh=cMove==='护盾',pFf=pI.type==='flyshield',cFf=cI.type==='flyshield';
  if(pCx)r.playerEnergyDelta+=1;if(cCx)r.computerEnergyDelta+=1;
  if(pCx&&cAtk){r.playerDefeated=true;r.computerEnergyDelta-=cI.cost;r.description='苍心被'+cMove+'击败！';return r}
  if(cCx&&pAtk){r.computerDefeated=true;r.playerEnergyDelta-=pI.cost;r.description=pMove+'击败苍心！';return r}
  if(pCx&&cCx){r.description='双方蓄力！';return r}
  if(pFf){if(cMove==='六电'){r.playerDefeated=true;r.computerEnergyDelta-=cI.cost;r.description='飞飞被六电击落！';return r}if(cAtk){r.computerEnergyDelta-=cI.cost;r.description='飞飞闪避'+cMove;return r}if(cCx){r.description='对手蓄力,飞飞飘舞';return r}if(cFf){r.description='双方飞舞';return r}if(cSh){r.description='双方防御';return r}}
  if(cFf){if(pMove==='六电'){r.computerDefeated=true;r.playerEnergyDelta-=pI.cost;r.description='六电击落飞飞！';return r}if(pAtk){r.playerEnergyDelta-=pI.cost;r.description='飞飞闪避'+pMove;return r}if(pCx){r.description='蓄力中,对手飞飞';return r}if(pSh){r.description='双方防御';return r}}
  function sRes(isP){const ak=isP?'computerEnergyDelta':'playerEnergyDelta',dk=isP?'playerEnergyDelta':'computerEnergyDelta',dk2=isP?'playerDefeated':'computerDefeated',ai=isP?cI:pI,an=isP?cMove:pMove,dl=isP?'你':'对手';const o={playerEnergyDelta:0,computerEnergyDelta:0,playerDefeated:false,computerDefeated:false,description:''};o[ak]-=ai.cost;if(ai.shieldResult==='blocked')o.description=dl+'护盾挡住'+an;else if(ai.shieldResult==='energyLoss'){o[dk]-=1;o.description=dl+'护盾被'+an+'击穿-1能'}else{o[dk2]=true;o.description=dl+'护盾挡不住'+an}return o}
  if(pSh&&cAtk){Object.assign(r,sRes(true));return r}if(cSh&&pAtk){Object.assign(r,sRes(false));return r}
  if(pSh&&cCx){r.description='对手蓄力,你举盾';return r}if(cSh&&pCx){r.description='你蓄力,对手举盾';return r}if(pSh&&cSh){r.description='双方举盾';return r}
  if(pAtk&&cAtk){r.playerEnergyDelta-=pI.cost;r.computerEnergyDelta-=cI.cost;if(pI.power>cI.power){r.computerDefeated=true;r.description=pMove+'击败'+cMove+'！'}else if(cI.power>pI.power){r.playerDefeated=true;r.description=cMove+'击败'+pMove+'！'}else{r.description='平手！'}return r}
  r.description='对峙...';return r;
}

function getAvailAI(ms,egy,ch){return Object.entries(ms).filter(([n,i])=>{if(i.chargeCost)return ch>0||egy>=i.chargeCost;return!(i.type==='attack'&&egy<i.cost)}).map(([n])=>n)}
function aiChoose(pE,cE){
  const cM=getComputerMoves(),pM=getPlayerMoves(),cAtt=Object.entries(cM).filter(([_,i])=>i.type==='attack').map(([n])=>n),avail=getAvailAI(cM,cE,state.computerBingdiaoCharges),w={};for(const m of avail)w[m]=1;
  if(cE===0&&pE===0&&avail.includes('苍心'))w['苍心']+=1000;
  if(cE<=1&&avail.includes('苍心'))w['苍心']+=5;
  if(pE<=1&&cE>=1)for(const a of cAtt)if(avail.includes(a)&&cE>=cM[a].cost)w[a]+=3;
  for(const a of cAtt)if(cM[a].power>=4&&cE>=cM[a].cost&&avail.includes(a))w[a]+=5;
  if(pE>=3&&getAvailAI(pM,pE,state.playerBingdiaoCharges).some(m=>pM[m].type==='attack')){if(avail.includes('护盾'))w['护盾']+=2;if(avail.includes('飞飞'))w['飞飞']+=3}
  if(cE>=2&&cE<4)for(const a of cAtt)if(cM[a].power===2&&avail.includes(a))w[a]+=2;
  if(avail.includes('天马')&&cE>=1)w['天马']+=2;if(avail.includes('天马流星转转拳')&&cE>=3)w['天马流星转转拳']+=4;
  if(avail.includes('冰雕朝翅飞')&&cE>=3)w['冰雕朝翅飞']+=5;if(avail.includes('冰雕朝翅')&&cE>=2)w['冰雕朝翅']+=3;
  if(avail.includes('冰雕')){if(state.computerBingdiaoCharges>0)w['冰雕']+=3;else if(cE>=1)w['冰雕']+=1}
  for(const m of avail){w[m]=(w[m]||1)+(Math.random()-0.5)*3;if(w[m]<0.1)w[m]=0.1}
  const total=avail.reduce((s,m)=>s+w[m],0);let rand=Math.random()*total;
  for(const m of avail){rand-=w[m];if(rand<=0)return m}return avail[avail.length-1];
}

function showReplay(){const ap=gameHistory.phases;let h='<h2>📊 复盘</h2><div style="text-align:center;color:var(--dim);font-size:0.6em">每阶段'+winsPerPhase+'局制</div>';for(const ph of ap){h+='<div class="replay-phase"><h4>'+(ph.number===1?'⚔第一':ph.number===2?'🌟第二':'💥第三')+' ('+(ph.winner==='player'?'你胜':'电脑胜')+' '+ph.playerScore+':'+ph.computerScore+')</h4>';for(const rd of ph.rounds)h+='<div class="replay-round">'+(rd.winner==='player'?'<span class="r-win">✅</span>':'<span class="r-lose">❌</span>')+' R'+rd.number+': '+rd.playerMove+' vs '+rd.computerMove+'</div>';h+='</div>'}const pW=ap.filter(p=>p.winner==='player').length;h+='<div class="replay-final">🏆 '+((pW>ap.length/2)?'你':'电脑')+'获胜 ('+pW+':'+(ap.length-pW)+')</div><div style="text-align:center;margin-top:6px"><button class="btn-primary" id="rpr">再来一局</button> <button class="btn-secondary" id="rpc">关闭</button></div>';dom.overlayBox.innerHTML=h;$('#rpr').addEventListener('click',resetGame);$('#rpc').addEventListener('click',()=>dom.overlay.classList.add('hidden'))}
function resetGame(){movesNeedRebuild=true;activeTab='base';state={currentPhase:1,phase1Winner:null,phase2Winner:null,phase1PlayerScore:0,phase1ComputerScore:0,phase2PlayerScore:0,phase2ComputerScore:0,playerEnergy:0,computerEnergy:0,playerScore:0,computerScore:0,currentRound:1,turnInRound:0,gameOver:false,awaitingPlayer:true,playerMove:null,computerMove:null,lastResult:null,playerBingdiaoCharges:0,computerBingdiaoCharges:0};gameHistory={winsPerPhase,phases:[]};currentPhaseHistory={number:1,rounds:[],winner:null,playerScore:0,computerScore:0};playerHistory=[];aiMood=0.5;dom.overlay.classList.add('hidden');clearAllFx();startNewRound()}
function playerChoose(move){if(!state.awaitingPlayer||state.gameOver)return;const pM=getPlayerMoves(),info=pM[move];if(info.chargeCost){if(!(state.playerBingdiaoCharges>0||state.playerEnergy>=info.chargeCost))return}else if(info.type==='attack'&&state.playerEnergy<info.cost)return;if(info.chargeCost){if(state.playerBingdiaoCharges>0){}else{state.playerEnergy-=info.chargeCost;state.playerBingdiaoCharges=info.chargesPerPay}}state.awaitingPlayer=false;state.playerMove=move;playerHistory.push(move);if(playerHistory.length>30)playerHistory.shift();state.computerMove=aiChoose(state.playerEnergy,state.computerEnergy);const cInfo=getComputerMoves()[state.computerMove];if(cInfo&&cInfo.chargeCost){if(state.computerBingdiaoCharges>0){}else if(state.computerEnergy>=cInfo.chargeCost){state.computerEnergy-=cInfo.chargeCost;state.computerBingdiaoCharges=cInfo.chargesPerPay}}const result=resolveTurn(state.playerMove,state.computerMove);if(info.chargeCost)state.playerBingdiaoCharges--;if(cInfo&&cInfo.chargeCost)state.computerBingdiaoCharges--;state.lastResult=result;state.turnInRound++;state.playerEnergy+=result.playerEnergyDelta;state.computerEnergy+=result.computerEnergyDelta;state.playerEnergy=Math.max(0,state.playerEnergy);state.computerEnergy=Math.max(0,state.computerEnergy);triggerAnim(state.playerMove,state.computerMove,result);updateUI();if(result.playerDefeated||result.computerDefeated){const winner=result.playerDefeated?'computer':'player';if(result.computerDefeated)aiMood=Math.min(1,aiMood+0.15);else aiMood=Math.max(0,aiMood-0.1);setTimeout(()=>endRound(winner),1500)}else{setTimeout(()=>{state.awaitingPlayer=true;state.playerMove=null;state.computerMove=null;updateUI()},1500)}}

// ═══════════ INIT ═══════════
resizeCanvas();getCharPositions();requestAnimationFrame(gameLoop);
$$('#win-options .win-opt').forEach(b=>b.addEventListener('click',()=>{$$('#win-options .win-opt').forEach(x=>x.classList.remove('sel'));b.classList.add('sel');selectedWins=parseInt(b.dataset.wins)}));
$('#start-game-btn').addEventListener('click',()=>{winsPerPhase=selectedWins;movesNeedRebuild=true;gameHistory.winsPerPhase=winsPerPhase;currentPhaseHistory={number:1,rounds:[],winner:null,playerScore:0,computerScore:0};dom.setup.classList.add('hidden');resizeCanvas();getCharPositions();startNewRound()});
$('#rules-btn').addEventListener('click',()=>$('#rules-modal').classList.remove('hidden'));
$('#rules-close').addEventListener('click',()=>$('#rules-modal').classList.add('hidden'));
$('#rules-modal').addEventListener('click',e=>{if(e.target===$('#rules-modal'))$('#rules-modal').classList.add('hidden')});
document.addEventListener('keydown',e=>{if(!state.awaitingPlayer||state.gameOver)return;const keys={'1':'苍心','2':'护盾','3':'波波','4':'六电','5':'搓搓','6':'八嘎','7':'天马','8':'天马流星转转拳','9':'冰雕','0':'朝翅','-':'冰雕朝翅','=':'冰雕朝翅飞','f':'飞飞'};const move=keys[e.key];if(move&&getPlayerMoves()[move])playerChoose(move)});
window.addEventListener('resize',()=>{resizeCanvas();getCharPositions()});
})();
</script>
