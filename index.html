<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>苍心 · 气功对决</title>
<style>
:root{--bg:#0a0a14;--surf:#141428;--gold:#c9a96e;--gol2:#e0c78a;--txt:#d5cfc0;--dim:#8888a0;--dan:#c0392b;--p2:#f1c40f;--p3:#e056a0}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:"PingFang SC","Microsoft YaHei",sans-serif;background:var(--bg);color:var(--txt);height:100vh;display:flex;justify-content:center;align-items:center;overflow:hidden;user-select:none;-webkit-user-select:none}
#game{width:100%;max-width:480px;height:100vh;display:flex;flex-direction:column;position:relative}
#topbar{display:flex;align-items:center;justify-content:space-between;padding:4px 8px;gap:4px;z-index:5;background:rgba(10,10,20,0.95)}
#topbar h1{font-size:1.1em;background:linear-gradient(180deg,var(--gol2),var(--gold));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
#phase-tag{font-size:0.58em;padding:2px 5px;border-radius:4px;font-weight:bold}
#phase-tag.p1{background:rgba(201,169,110,0.12);color:var(--gold);border:1px solid rgba(201,169,110,0.2)}
#phase-tag.p2{background:rgba(241,196,15,0.12);color:var(--p2);border:1px solid rgba(241,196,15,0.2)}
#phase-tag.p3{background:rgba(224,86,160,0.12);color:var(--p3);border:1px solid rgba(224,86,160,0.2)}
#scoredisp{display:flex;align-items:center;gap:3px;font-size:0.68em}
#scoredisp .sc{font-weight:bold;color:var(--gol2);font-size:1.1em}
#round-info{font-size:0.54em;color:var(--dim);text-align:center}
#arena-wrap{flex:1;position:relative;overflow:hidden;min-height:280px}
#arena-canvas{position:absolute;top:0;left:0;width:100%;height:100%}
#result-pop{position:absolute;top:28%;left:50%;transform:translate(-50%,-50%);z-index:22;pointer-events:none;font-weight:bold;font-size:1em;text-align:center;opacity:0;transition:opacity 0.3s;text-shadow:0 0 12px rgba(0,0,0,0.9)}
#result-pop.show{opacity:1}
#result-pop.win{color:#2ecc71;text-shadow:0 0 20px rgba(46,204,113,0.8)}
#result-pop.lose{color:#e74c3c;text-shadow:0 0 20px rgba(231,76,60,0.8)}
.egy-disp{position:absolute;font-size:0.55em;color:var(--dim);pointer-events:none}
#player-egy-disp{bottom:4px;left:8px}#enemy-egy-disp{bottom:4px;right:8px}

#card-area{background:var(--surf);padding:4px;border-top:1px solid rgba(255,255,255,0.05);z-index:5}
#card-tabs{display:flex;gap:2px;justify-content:center;margin-bottom:2px}
#card-tabs .ctab{padding:2px 6px;border-radius:4px;border:1px solid rgba(255,255,255,0.07);background:transparent;color:var(--dim);font-size:0.55em;cursor:pointer;font-family:inherit}
#card-tabs .ctab.on{background:rgba(201,169,110,0.1);border-color:var(--gold);color:var(--gold)}
#card-tabs .ctab.p2tab.on{background:rgba(241,196,15,0.1);border-color:var(--p2);color:var(--p2)}
#card-tabs .ctab.p3tab.on{background:rgba(224,86,160,0.1);border-color:var(--p3);color:var(--p3)}
#cards-row{display:flex;gap:2px;justify-content:center;flex-wrap:wrap}
.card{width:54px;padding:4px 2px;border-radius:6px;border:1.5px solid rgba(255,255,255,0.06);background:rgba(14,14,28,0.92);color:var(--txt);cursor:pointer;font-size:0.55em;font-weight:bold;font-family:inherit;transition:all 0.1s;text-align:center;display:flex;flex-direction:column;align-items:center}
.card:active:not(:disabled){transform:scale(0.9)}
.card:disabled{opacity:0.22;cursor:not-allowed;filter:grayscale(0.5)}
.card .cicon{font-size:1.3em;line-height:1}
.card .cname{font-size:0.8em}.card .ccost{font-size:0.58em;opacity:0.7}.card .ccharge{font-size:0.54em;color:#f39c12}
.card.charge{border-color:rgba(46,204,113,0.3)}.card.shield{border-color:rgba(52,152,219,0.3)}.card.flyshield{border-color:rgba(100,220,200,0.3)}.card.attack{border-color:rgba(231,76,60,0.18)}
.card.p2card:not(:disabled){border-color:rgba(241,196,15,0.3)}.card.p3card:not(:disabled){border-color:rgba(224,86,160,0.3)}

#overlay{position:fixed;inset:0;background:rgba(0,0,0,0.82);display:flex;justify-content:center;align-items:center;z-index:100;backdrop-filter:blur(4px)}
#overlay.hidden{display:none}
#overlay-box{background:var(--surf);border-radius:14px;border:2px solid var(--gold);padding:18px 12px;text-align:center;max-width:330px;width:90%;max-height:80vh;overflow-y:auto;animation:popIn 0.3s ease-out}
@keyframes popIn{0%{transform:scale(0.5);opacity:0}100%{transform:scale(1);opacity:1}}
#overlay-box h2{font-size:1.2em;color:var(--gol2);margin-bottom:2px}
#overlay-box .phase-result{font-size:0.62em;color:var(--dim);margin-bottom:2px}
#overlay-box .winner-text{font-size:0.75em;color:var(--txt);margin-bottom:10px;line-height:1.4;white-space:pre-line}
#overlay-box button{padding:7px 14px;font-size:0.78em;font-weight:bold;border:none;border-radius:14px;cursor:pointer;font-family:inherit;margin:2px}
#overlay-box .btn-primary{background:linear-gradient(135deg,var(--gold),#a08040);color:#1a1a14}
#overlay-box .btn-secondary{background:transparent;border:1px solid var(--gold);color:var(--gold)}

#setup{position:fixed;inset:0;background:var(--bg);display:flex;justify-content:center;align-items:center;z-index:300;flex-direction:column;gap:12px}
#setup.hidden{display:none}
#setup h1{font-size:2.5em;background:linear-gradient(180deg,var(--gol2),var(--gold));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
#setup .win-options{display:flex;gap:5px}
#setup .win-opt{padding:10px 14px;border-radius:10px;border:2px solid rgba(255,255,255,0.1);background:var(--surf);color:var(--txt);cursor:pointer;font-size:0.9em;font-weight:bold;font-family:inherit}
#setup .win-opt.sel{border-color:var(--gold);background:rgba(201,169,110,0.08);color:var(--gol2)}
#setup .start-btn{padding:10px 26px;border-radius:16px;border:none;background:linear-gradient(135deg,var(--gold),#a08040);color:#1a1a14;font-size:0.95em;font-weight:bold;cursor:pointer;font-family:inherit}
#rules-btn{position:fixed;top:4px;right:4px;width:22px;height:22px;border-radius:50%;border:1px solid rgba(255,255,255,0.1);background:var(--surf);color:var(--dim);font-size:0.65em;cursor:pointer;z-index:50;display:flex;align-items:center;justify-content:center}
#rules-modal{position:fixed;inset:0;background:rgba(0,0,0,0.8);display:flex;justify-content:center;align-items:center;z-index:200;backdrop-filter:blur(4px)}
#rules-modal.hidden{display:none}
#rules-box{background:var(--surf);border-radius:10px;border:1px solid rgba(201,169,110,0.3);padding:10px;max-width:350px;width:92%;max-height:74vh;overflow-y:auto;font-size:0.62em;line-height:1.3}
#rules-box h3{color:var(--gold);text-align:center;margin-bottom:3px}
#rules-box .rule-group{margin-bottom:3px;color:var(--dim)}#rules-box .rule-group h4{color:var(--gol2)}
#rules-box .close-btn{display:block;margin:4px auto 0;padding:4px 12px;border-radius:10px;border:1px solid var(--gold);background:transparent;color:var(--gold);cursor:pointer;font-family:inherit}
.replay-phase{margin:4px 0;padding:4px;border-radius:5px;background:rgba(255,255,255,0.02)}.replay-phase h4{color:var(--gold);font-size:0.7em}.replay-round{font-size:0.58em;color:var(--dim)}.replay-round .r-win{color:#2ecc71}.replay-round .r-lose{color:var(--dan)}.replay-final{text-align:center;font-size:0.75em;color:var(--gol2);font-weight:bold}
</style>
</head>
<body>

<div id="setup">
  <h1>苍 心</h1><div style="color:var(--dim)">气 功 对 决</div>
  <div style="color:var(--dim)">每阶段获胜局数</div>
  <div class="win-options" id="win-options">
    <button class="win-opt" data-wins="1">1局</button>
    <button class="win-opt sel" data-wins="3">3局</button>
    <button class="win-opt" data-wins="2">2局</button>
  </div>
  <button class="start-btn" id="start-game-btn">开始对决</button>
</div>

<div id="game">
  <div id="topbar"><h1>苍 心</h1><div id="phase-tag" class="p1">⚔一阶段</div><div id="scoredisp"><span class="sc" id="pscore">0</span>:<span class="sc" id="cscore">0</span></div></div>
  <div id="round-info"></div>
  <div id="arena-wrap"><canvas id="arena-canvas"></canvas><div id="result-pop"></div><div class="egy-disp" id="player-egy-disp">⚡0</div><div class="egy-disp" id="enemy-egy-disp">⚡0</div></div>
  <div id="card-area"><div id="card-tabs"></div><div id="cards-row"></div></div>
</div>

<div id="overlay" class="hidden"><div id="overlay-box"></div></div>
<button id="rules-btn">?</button>
<div id="rules-modal" class="hidden"><div id="rules-box">
  <h3>📜 规则</h3><div class="rule-group"><h4>⚔一阶段</h4>各6招，先赢N局胜出。</div><div class="rule-group"><h4>☯苍心</h4>+1能。被攻击即败。</div><div class="rule-group"><h4>🛡护盾</h4>挡波波/天马/冰雕/朝翅。六电(-1能)。</div><div class="rule-group"><h4>💨波波＜⚡六电＜🔥搓搓＜💀八嘎</h4></div><div class="rule-group"><h4>🌟P2</h4>🦄天马(-1)威力=六电。🌟转转拳(-3)威力=八嘎。</div><div class="rule-group"><h4>💥P3</h4>❄冰雕(1能3次)。🦅朝翅(-1)威力=搓搓。❄🦅冰雕朝翅(-2)威力=八嘎。💥冰雕朝翅飞(-3)威力>八嘎。🕊飞飞仅六电能击落。</div>
  <button class="close-btn" id="rules-close">知道了</button>
</div></div>

<script>
(function(){
const $=s=>document.querySelector(s),$$=s=>document.querySelectorAll(s);
const BASE_MOVES={
  '苍心':{type:'charge',cost:0,power:0,icon:'☯',anim:'charge'},
  '护盾':{type:'shield',cost:0,power:0,icon:'🛡',anim:'shield'},
  '波波':{type:'attack',cost:1,power:1,icon:'💨',anim:'wave',shieldResult:'blocked'},
  '六电':{type:'attack',cost:2,power:2,icon:'⚡',anim:'bolt',shieldResult:'energyLoss'},
  '搓搓':{type:'attack',cost:3,power:3,icon:'🔥',anim:'fire',shieldResult:'pierce'},
  '八嘎':{type:'attack',cost:4,power:4,icon:'💀',anim:'dark',shieldResult:'pierce'},
};
const PHASE2_BONUS={
  '天马':{type:'attack',cost:1,power:2,icon:'🦄',anim:'pegasus',shieldResult:'blocked',bonus:true,phase:2},
  '天马流星转转拳':{type:'attack',cost:3,power:4,icon:'🌟',anim:'meteor',shieldResult:'pierce',bonus:true,phase:2},
};
const PHASE3_BONUS={
  '冰雕':{type:'attack',cost:0,power:0,icon:'❄',anim:'ice',shieldResult:'blocked',bonus:true,phase:3,chargeCost:1,chargesPerPay:3},
  '朝翅':{type:'attack',cost:1,power:3,icon:'🦅',anim:'wing',shieldResult:'blocked',bonus:true,phase:3},
  '冰雕朝翅':{type:'attack',cost:2,power:4,icon:'❄🦅',anim:'icewing',shieldResult:'pierce',bonus:true,phase:3},
  '冰雕朝翅飞':{type:'attack',cost:3,power:5,icon:'💥',anim:'ult',shieldResult:'pierce',bonus:true,phase:3},
  '飞飞':{type:'flyshield',cost:0,power:0,icon:'🕊',anim:'fly',bonus:true,phase:3},
};

let winsPerPhase=3,selectedWins=3;
let state={currentPhase:1,phase1Winner:null,phase2Winner:null,phase1PlayerScore:0,phase1ComputerScore:0,phase2PlayerScore:0,phase2ComputerScore:0,playerEnergy:0,computerEnergy:0,playerScore:0,computerScore:0,currentRound:1,turnInRound:0,gameOver:false,awaitingPlayer:true,playerMove:null,computerMove:null,lastResult:null,playerBingdiaoCharges:0,computerBingdiaoCharges:0};
let playerHistory=[],aiMood=0.5,gameHistory={winsPerPhase:3,phases:[]},currentPhaseHistory=null;
let activeTab='base',movesNeedRebuild=true;
function getPlayerMoves(){let m={...BASE_MOVES};if(state.currentPhase>=2&&state.phase1Winner==='player')Object.assign(m,PHASE2_BONUS);if(state.currentPhase>=3&&state.phase2Winner==='player')Object.assign(m,PHASE3_BONUS);return m}
function getComputerMoves(){let m={...BASE_MOVES};if(state.currentPhase>=2&&state.phase1Winner==='computer')Object.assign(m,PHASE2_BONUS);if(state.currentPhase>=3&&state.phase2Winner==='computer')Object.assign(m,PHASE3_BONUS);return m}

// ═══ CANVAS ═══
const canvas=$('#arena-canvas'),ctx=canvas.getContext('2d');let W,H;
function rc(){const r=$('#arena-wrap').getBoundingClientRect();W=canvas.width=r.width*2;H=canvas.height=r.height*2;canvas.style.width=r.width+'px';canvas.style.height=r.height+'px';ctx.scale(2,2);W/=2;H/=2}
window.addEventListener('resize',rc);

// ═══ PARTICLES ═══
let pts=[],pjs=[],imps=[],shake=0,flashA=0,flashC='',animT=0;
function sp(x,y,c,n,spd,l){for(let i=0;i<n;i++){const a=Math.random()*Math.PI*2,s=(Math.random()*spd||3)+1;pts.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,l:l||0.6,ml:l||0.6,c,s:Math.random()*3+1.5})}}
function pj(x,y,tx,ty,c,sz,tr){pjs.push({x,y,tx,ty,c,s:sz||6,tr:tr||c,p:0,sp:0.05+Math.random()*0.02})}
function imp(x,y,c,sz){imps.push({x,y,c,s:sz||40,l:0.4,ml:0.4})}
function sh(amt){shake=Math.max(shake,amt)}
function fl(color,alpha){flashA=alpha||0.4;flashC=color}

// ═══ DETAILED FIGHTER ═══
function drawFighter(cx,cy,f,glow,st){
  const fl=x=>cx+f*x,s=st||{};
  ctx.save();
  // Ambient glow
  const gg=ctx.createRadialGradient(cx,cy-10,8,cx,cy-10,70);
  gg.addColorStop(0,glow.replace('rgb','rgba').replace(')',',0.2)'));gg.addColorStop(1,'transparent');
  ctx.fillStyle=gg;ctx.beginPath();ctx.arc(cx,cy,55,0,Math.PI*2);ctx.fill();
  // Ground shadow
  ctx.fillStyle='rgba(0,0,0,0.35)';ctx.beginPath();ctx.ellipse(cx,cy+60,26,4.5,0,0,Math.PI*2);ctx.fill();

  function body(){
    // ── LEGS with muscle definition ──
    const ls=s.kicking?18:8;
    // Back calf + thigh
    ctx.fillStyle='#151515';ctx.strokeStyle=glow;ctx.lineWidth=1.2;
    ctx.beginPath();ctx.roundRect(fl(-ls-5),cy+28,11,28,5);ctx.fill();ctx.stroke();
    ctx.beginPath();ctx.roundRect(fl(-ls-6),cy+52,13,7,4);ctx.fill();ctx.stroke();
    // Front calf + thigh (thicker - front leg is weight-bearing)
    ctx.fillStyle='#1a1a1a';
    ctx.beginPath();ctx.roundRect(fl(ls-3),cy+30,11,26,5);ctx.fill();ctx.stroke();
    ctx.beginPath();ctx.roundRect(fl(ls-4),cy+52,13,7,4);ctx.fill();ctx.stroke();
    // Knee highlights
    ctx.fillStyle=glow.replace('rgb','rgba').replace(')',',0.15)');ctx.beginPath();ctx.arc(fl(ls+2),cy+40,5,0,Math.PI*2);ctx.fill();

    // ── TORSO (athletic V-shape) ──
    ctx.fillStyle='#111';ctx.strokeStyle=glow;ctx.lineWidth=1.4;
    ctx.beginPath();ctx.moveTo(fl(-18),cy-8);ctx.lineTo(fl(18),cy-8);
    ctx.lineTo(fl(16),cy+28);ctx.lineTo(fl(-16),cy+28);ctx.closePath();ctx.fill();ctx.stroke();
    // Pectoral definition lines
    ctx.strokeStyle=glow.replace('rgb','rgba').replace(')',',0.2)');ctx.lineWidth=0.8;
    ctx.beginPath();ctx.moveTo(fl(-8),cy-2);ctx.quadraticCurveTo(fl(0),cy+2,fl(8),cy-2);ctx.stroke();
    ctx.beginPath();ctx.moveTo(fl(0),cy+1);ctx.lineTo(fl(0),cy+14);ctx.stroke();
    // Abs lines
    for(let i=0;i<3;i++){ctx.beginPath();ctx.moveTo(fl(-7),cy+6+i*6);ctx.lineTo(fl(7),cy+6+i*6);ctx.stroke()}
    ctx.strokeStyle=glow;ctx.lineWidth=1.4;

    // ── BELT + Obi ──
    ctx.fillStyle='#0a0a0a';ctx.strokeStyle='#d4a030';ctx.lineWidth=2.5;
    ctx.beginPath();ctx.roundRect(fl(-17),cy+22,34,7,3);ctx.fill();ctx.stroke();
    // Belt knot + hanging ends
    ctx.fillStyle='#d4a030';ctx.beginPath();ctx.roundRect(fl(-3),cy+20,8,12,2);ctx.fill();
    ctx.strokeStyle='#d4a030';ctx.lineWidth=2;
    ctx.beginPath();ctx.moveTo(fl(1),cy+30);ctx.lineTo(fl(4),cy+42);ctx.stroke();
    ctx.beginPath();ctx.moveTo(fl(-3),cy+30);ctx.lineTo(fl(-6),cy+40);ctx.stroke();
    ctx.strokeStyle=glow;ctx.lineWidth=1.4;

    // ── BACK ARM (guard position) ──
    ctx.fillStyle='#151515';
    ctx.save();ctx.translate(fl(-14),cy-6);ctx.rotate(f*0.4);
    ctx.beginPath();ctx.roundRect(-5,0,10,24,4);ctx.fill();ctx.stroke();
    // Bicep curve
    ctx.strokeStyle=glow.replace('rgb','rgba').replace(')',',0.3)');ctx.lineWidth=0.7;
    ctx.beginPath();ctx.arc(fl(-14)+f*Math.sin(0.4)*12,cy-6+Math.cos(0.4)*12,5,0,Math.PI*2);ctx.stroke();
    ctx.strokeStyle=glow;ctx.lineWidth=1.4;ctx.restore();
    // Back fist
    const bfx=fl(-14)+f*Math.sin(0.4)*24,bfy=cy-6+Math.cos(0.4)*24;
    ctx.fillStyle='#0a0a0a';ctx.beginPath();ctx.arc(bfx,bfy,7.5,0,Math.PI*2);ctx.fill();ctx.stroke();
    // Knuckle lines
    ctx.strokeStyle=glow.replace('rgb','rgba').replace(')',',0.25)');ctx.lineWidth=0.6;
    for(let i=0;i<3;i++){ctx.beginPath();ctx.moveTo(bfx-3,bfy-4+i*3);ctx.lineTo(bfx+3,bfy-4+i*3);ctx.stroke()}
    ctx.strokeStyle=glow;ctx.lineWidth=1.4;

    // ── FRONT ARM (punching arm) ──
    const pRot=s.punching?f*(-1.1):f*(-0.25);
    ctx.fillStyle='#1a1a1a';
    ctx.save();ctx.translate(fl(12),cy-4);ctx.rotate(pRot);
    ctx.beginPath();ctx.roundRect(-5,0,10,26,4);ctx.fill();ctx.stroke();ctx.restore();
    // Front fist + knuckles
    const ffx=fl(12)+f*Math.sin(pRot)*26,ffy=cy-4+Math.cos(pRot)*26;
    ctx.fillStyle='#0a0a0a';ctx.beginPath();ctx.arc(ffx,ffy,s.punching?9:7.5,0,Math.PI*2);ctx.fill();ctx.stroke();
    ctx.strokeStyle=glow.replace('rgb','rgba').replace(')',',0.25)');ctx.lineWidth=0.6;
    for(let i=0;i<3;i++){ctx.beginPath();ctx.moveTo(ffx-(s.punching?4:3),ffy-4+i*3);ctx.lineTo(ffx+(s.punching?4:3),ffy-4+i*3);ctx.stroke()}

    // ── NECK + collarbone ──
    ctx.strokeStyle=glow;ctx.lineWidth=1.4;ctx.fillStyle='#151515';
    ctx.beginPath();ctx.roundRect(fl(-5),cy-16,10,12,3);ctx.fill();ctx.stroke();
    ctx.strokeStyle=glow.replace('rgb','rgba').replace(')',',0.2)');ctx.lineWidth=0.7;
    ctx.beginPath();ctx.moveTo(fl(-14),cy-12);ctx.quadraticCurveTo(fl(0),cy-14,fl(14),cy-12);ctx.stroke();

    // ── HEAD ──
    ctx.strokeStyle=glow;ctx.lineWidth=1.4;ctx.fillStyle='#0d0d0d';
    ctx.beginPath();ctx.arc(cx,cy-28,17,0,Math.PI*2);ctx.fill();ctx.stroke();
    // Jaw line
    ctx.strokeStyle=glow.replace('rgb','rgba').replace(')',',0.3)');ctx.lineWidth=0.8;
    ctx.beginPath();ctx.moveTo(fl(-10),cy-20);ctx.quadraticCurveTo(fl(0),cy-12,fl(10),cy-20);ctx.stroke();
    // Headband
    ctx.strokeStyle=glow;ctx.lineWidth=2.5;ctx.beginPath();ctx.arc(cx,cy-32,17.5,1.3,1.85);ctx.stroke();
    // Headband tails flowing
    ctx.strokeStyle=glow;ctx.lineWidth=1.8;
    ctx.beginPath();ctx.moveTo(fl(-18),cy-32);ctx.quadraticCurveTo(fl(-26),cy-22,fl(-20),cy-12);ctx.stroke();
    ctx.beginPath();ctx.moveTo(fl(18),cy-32);ctx.quadraticCurveTo(fl(26),cy-22,fl(20),cy-12);ctx.stroke();
    // Hair spikes (fighter style)
    ctx.strokeStyle=glow;ctx.lineWidth=1.4;ctx.fillStyle='#080808';
    ctx.beginPath();ctx.moveTo(fl(-15),cy-35);ctx.lineTo(fl(-12),cy-50);ctx.lineTo(fl(-4),cy-37);ctx.fill();ctx.stroke();
    ctx.beginPath();ctx.moveTo(fl(-3),cy-37);ctx.lineTo(fl(1),cy-52);ctx.lineTo(fl(7),cy-37);ctx.fill();ctx.stroke();
    ctx.beginPath();ctx.moveTo(fl(6),cy-37);ctx.lineTo(fl(12),cy-49);ctx.lineTo(fl(16),cy-35);ctx.fill();ctx.stroke();
    // Side hair
    ctx.beginPath();ctx.moveTo(fl(-16),cy-33);ctx.lineTo(fl(-20),cy-28);ctx.lineTo(fl(-16),cy-26);ctx.fill();ctx.stroke();
    ctx.beginPath();ctx.moveTo(fl(16),cy-33);ctx.lineTo(fl(20),cy-28);ctx.lineTo(fl(16),cy-26);ctx.fill();ctx.stroke();

    // ── FACE ──
    // Glowing eyes
    ctx.fillStyle='#fff';ctx.shadowColor=glow;ctx.shadowBlur=10;
    ctx.beginPath();ctx.arc(fl(-6),cy-30,3,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(fl(6),cy-30,3,0,Math.PI*2);ctx.fill();
    ctx.shadowBlur=0;
    // Determined eyebrows
    ctx.strokeStyle=glow;ctx.lineWidth=1.8;
    ctx.beginPath();ctx.moveTo(fl(-10),cy-34);ctx.lineTo(fl(-2),cy-33);ctx.stroke();
    ctx.beginPath();ctx.moveTo(fl(2),cy-33);ctx.lineTo(fl(10),cy-34);ctx.stroke();
    // Mouth expression
    if(s.dead){ctx.strokeStyle=glow;ctx.beginPath();ctx.arc(cx,cy-20,5,0,Math.PI);ctx.stroke()}
    else if(s.hit){ctx.fillStyle='#fff';ctx.shadowColor='#f00';ctx.shadowBlur=8;ctx.beginPath();ctx.arc(cx,cy-20,6,0,Math.PI*2);ctx.fill();ctx.shadowBlur=0}
    else{ctx.strokeStyle=glow;ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(fl(-4),cy-22);ctx.lineTo(fl(4),cy-22);ctx.stroke()}
  }
  body();
  if(s.hit){ctx.fillStyle=glow.replace('rgb','rgba').replace(')',',0.25)');ctx.beginPath();ctx.arc(cx,cy-10,48,0,Math.PI*2);ctx.fill()}
  ctx.restore();
}

// ═══ RENDER ═══
let pAnim={x:0,y:0,st:{}},eAnim={x:0,y:0,st:{}};
function resetChars(){pAnim={x:W*0.2,y:H*0.58,st:{}};eAnim={x:W*0.8,y:H*0.58,st:{}}}
function idleAnim(dt){animT+=dt;if(animT>999)animT=0;pAnim.y+=Math.sin(animT*2.5)*0.2;eAnim.y+=Math.sin(animT*2.5+1)*0.2}

function render(){
  ctx.clearRect(0,0,W,H);
  const bg=ctx.createLinearGradient(0,0,0,H);bg.addColorStop(0,'#1a1a35');bg.addColorStop(0.4,'#121225');bg.addColorStop(1,'#180a14');
  ctx.fillStyle=bg;ctx.fillRect(0,0,W,H);
  ctx.fillStyle='rgba(201,169,110,0.06)';ctx.fillRect(0,H*0.83,W,1.5);
  const sx=(Math.random()-0.5)*shake*2,sy=(Math.random()-0.5)*shake*2;ctx.save();ctx.translate(sx,sy);
  drawFighter(pAnim.x,pAnim.y,1,'rgb(80,180,255)',pAnim.st);
  drawFighter(eAnim.x,eAnim.y,-1,'rgb(255,90,90)',eAnim.st);
  // Particles
  for(const p of pts){const a=p.l/p.ml;ctx.globalAlpha=a;ctx.fillStyle=p.c;ctx.beginPath();ctx.arc(p.x,p.y,p.s*a,0,Math.PI*2);ctx.fill()}
  // Projectiles
  for(const p of pjs){const px=p.x+(p.tx-p.x)*p.p,py=p.y+(p.ty-p.y)*p.p;ctx.globalAlpha=1;
    for(let i=0;i<4;i++){const tp=p.p-i*0.06;if(tp<0)continue;ctx.fillStyle=p.tr;ctx.globalAlpha=(1-tp)*0.25;ctx.beginPath();ctx.arc(p.x+(p.tx-p.x)*tp,p.y+(p.ty-p.y)*tp,p.s*(0.4+i*0.15),0,Math.PI*2);ctx.fill()}
    ctx.fillStyle=p.c;ctx.globalAlpha=1;ctx.beginPath();ctx.arc(px,py,p.s*1.5,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#fff';ctx.globalAlpha=0.7;ctx.beginPath();ctx.arc(px,py,p.s*0.5,0,Math.PI*2);ctx.fill()}
  // Impacts
  for(const i of imps){const p=1-(i.l/i.ml);ctx.globalAlpha=p<0.2?p/0.2:1;const r=i.s*(1+p*1.8);ctx.strokeStyle=i.c;ctx.lineWidth=3.5*(1-p);ctx.beginPath();ctx.arc(i.x,i.y,r,0,Math.PI*2);ctx.stroke();ctx.fillStyle=i.c;ctx.globalAlpha=(1-p)*0.3;ctx.beginPath();ctx.arc(i.x,i.y,r*0.4,0,Math.PI*2);ctx.fill()}
  ctx.globalAlpha=1;
  if(flashA>0){ctx.fillStyle=flashC;ctx.globalAlpha=flashA;ctx.fillRect(0,0,W,H);ctx.globalAlpha=1}
  ctx.restore();
}

let lt=0;
function loop(t){if(!lt)lt=t;const dt=Math.min((t-lt)/1000,0.1);lt=t;idleAnim(dt);
  for(const p of pts){p.x+=p.vx*dt*60;p.y+=p.vy*dt*60;p.l-=dt;p.vy+=dt*15}pts=pts.filter(p=>p.l>0);
  for(const p of pjs){p.p+=p.sp*dt*60;if(p.p>=1){imp(p.tx,p.ty,p.c,38);sp(p.tx,p.ty,p.c,14,5,0.45)}}
  pjs=pjs.filter(p=>p.p<1);
  for(const i of imps)i.l-=dt;imps=imps.filter(i=>i.l>0);
  shake*=0.84;if(shake<0.08)shake=0;flashA*=0.88;if(flashA<0.005)flashA=0;
  render();requestAnimationFrame(loop);
}

// ═══ TRIGGER ═══
function playRound(pMove,cMove,result){
  clearAllFx();pAnim.st={};eAnim.st={};
  const pI=getPlayerMoves()[pMove],cI=getComputerMoves()[cMove];

  // Player animation
  if(pI.type==='charge'){triggerSkillAnim('player','苍心',pAnim.x,pAnim.y,0,0,true)}
  else if(pI.type==='shield'){triggerSkillAnim('player','护盾',pAnim.x,pAnim.y,0,0,true)}
  else if(pI.type==='flyshield'){triggerSkillAnim('player','飞飞',pAnim.x,pAnim.y,0,0,true)}
  else if(pI.type==='attack'){
    if(!result.playerDefeated||result.computerDefeated){pAnim.st.punching=true;triggerSkillAnim('player',pMove,pAnim.x,pAnim.y-5,eAnim.x,eAnim.y-5,true)}
  }

  // Enemy animation
  if(cI.type==='charge'){triggerSkillAnim('enemy','苍心',eAnim.x,eAnim.y,0,0,false)}
  else if(cI.type==='shield'){triggerSkillAnim('enemy','护盾',eAnim.x,eAnim.y,0,0,false)}
  else if(cI.type==='flyshield'){triggerSkillAnim('enemy','飞飞',eAnim.x,eAnim.y,0,0,false)}
  else if(cI.type==='attack'){
    if(!result.computerDefeated||result.playerDefeated){eAnim.st.punching=true;triggerSkillAnim('enemy',cMove,eAnim.x,eAnim.y-5,pAnim.x,pAnim.y-5,false)}
  }

  // Hit results
  setTimeout(()=>{
    if(result.playerDefeated){pAnim.st.hit=true;pAnim.st.dead=true;sh(14);fl('#f00',0.3)}
    if(result.computerDefeated){eAnim.st.hit=true;eAnim.st.dead=true;sh(14);fl('#fff',0.35)}
  },400);

  setTimeout(()=>{pAnim.st={...pAnim.st,hit:false,punching:false};eAnim.st={...eAnim.st,hit:false,punching:false}},900);

  // Result text
  setTimeout(()=>{
    const rp=$('#result-pop');rp.textContent=result.description;rp.className='show';
    if(result.playerDefeated)rp.classList.add('lose');else if(result.computerDefeated)rp.classList.add('win');else rp.classList.add('tie');
    setTimeout(()=>rp.className='',1400);
  },500);
}

function resolveTurn(pMove,cMove){
  const pM=getPlayerMoves(),cM=getComputerMoves();const r={playerEnergyDelta:0,computerEnergyDelta:0,playerDefeated:false,computerDefeated:false,description:''};const pI=pM[pMove],cI=cM[cMove],pAtk=pI.type==='attack',cAtk=cI.type==='attack';const pCx=pMove==='苍心',cCx=cMove==='苍心',pSh=pMove==='护盾',cSh=cMove==='护盾',pFf=pI.type==='flyshield',cFf=cI.type==='flyshield';
  if(pCx)r.playerEnergyDelta+=1;if(cCx)r.computerEnergyDelta+=1;
  if(pCx&&cAtk){r.playerDefeated=true;r.computerEnergyDelta-=cI.cost;r.description='苍心被'+cMove+'击败！';return r}if(cCx&&pAtk){r.computerDefeated=true;r.playerEnergyDelta-=pI.cost;r.description=pMove+'击败苍心！';return r}if(pCx&&cCx){r.description='双方蓄力！';return r}
  if(pFf){if(cMove==='六电'){r.playerDefeated=true;r.computerEnergyDelta-=cI.cost;r.description='飞飞被六电击落！';return r}if(cAtk){r.computerEnergyDelta-=cI.cost;r.description='飞飞闪避'+cMove;return r}if(cCx){r.description='对手蓄力,飞飞飘舞';return r}if(cFf){r.description='双方飞舞';return r}if(cSh){r.description='双方防御';return r}}
  if(cFf){if(pMove==='六电'){r.computerDefeated=true;r.playerEnergyDelta-=pI.cost;r.description='六电击落飞飞！';return r}if(pAtk){r.playerEnergyDelta-=pI.cost;r.description='飞飞闪避'+pMove;return r}if(pCx){r.description='蓄力中,对手飞飞';return r}if(pSh){r.description='双方防御';return r}}
  function sRes(isP){const ak=isP?'computerEnergyDelta':'playerEnergyDelta',dk=isP?'playerEnergyDelta':'computerEnergyDelta',dk2=isP?'playerDefeated':'computerDefeated',ai=isP?cI:pI,an=isP?cMove:pMove,dl=isP?'你':'对手';const o={playerEnergyDelta:0,computerEnergyDelta:0,playerDefeated:false,computerDefeated:false,description:''};o[ak]-=ai.cost;if(ai.shieldResult==='blocked')o.description=dl+'护盾挡住'+an;else if(ai.shieldResult==='energyLoss'){o[dk]-=1;o.description=dl+'护盾被'+an+'击穿-1能'}else{o[dk2]=true;o.description=dl+'护盾挡不住'+an}return o}
  if(pSh&&cAtk){Object.assign(r,sRes(true));return r}if(cSh&&pAtk){Object.assign(r,sRes(false));return r}if(pSh&&cCx){r.description='对手蓄力,你举盾';return r}if(cSh&&pCx){r.description='你蓄力,对手举盾';return r}if(pSh&&cSh){r.description='双方举盾';return r}
  if(pAtk&&cAtk){r.playerEnergyDelta-=pI.cost;r.computerEnergyDelta-=cI.cost;if(pI.power>cI.power){r.computerDefeated=true;r.description=pMove+'击败'+cMove+'！'}else if(cI.power>pI.power){r.playerDefeated=true;r.description=cMove+'击败'+pMove+'！'}else{r.description='平手！'}return r}r.description='对峙...';return r;
}
function getAvailAI(ms,egy,ch){return Object.entries(ms).filter(([n,i])=>{if(i.chargeCost)return ch>0||egy>=i.chargeCost;return!(i.type==='attack'&&egy<i.cost)}).map(([n])=>n)}
function aiChoose(pE,cE){const cM=getComputerMoves(),pM=getPlayerMoves(),cAtt=Object.entries(cM).filter(([_,i])=>i.type==='attack').map(([n])=>n),avail=getAvailAI(cM,cE,state.computerBingdiaoCharges),w={};for(const m of avail)w[m]=1;if(cE===0&&pE===0&&avail.includes('苍心'))w['苍心']+=1000;if(cE<=1&&avail.includes('苍心'))w['苍心']+=5;if(pE<=1&&cE>=1)for(const a of cAtt)if(avail.includes(a)&&cE>=cM[a].cost)w[a]+=3;for(const a of cAtt)if(cM[a].power>=4&&cE>=cM[a].cost&&avail.includes(a))w[a]+=5;if(pE>=3&&getAvailAI(pM,pE,state.playerBingdiaoCharges).some(m=>pM[m].type==='attack')){if(avail.includes('护盾'))w['护盾']+=2;if(avail.includes('飞飞'))w['飞飞']+=3}if(cE>=2&&cE<4)for(const a of cAtt)if(cM[a].power===2&&avail.includes(a))w[a]+=2;if(avail.includes('天马')&&cE>=1)w['天马']+=2;if(avail.includes('天马流星转转拳')&&cE>=3)w['天马流星转转拳']+=4;if(avail.includes('冰雕朝翅飞')&&cE>=3)w['冰雕朝翅飞']+=5;if(avail.includes('冰雕朝翅')&&cE>=2)w['冰雕朝翅']+=3;if(avail.includes('冰雕')){if(state.computerBingdiaoCharges>0)w['冰雕']+=3;else if(cE>=1)w['冰雕']+=1}for(const m of avail){w[m]=(w[m]||1)+(Math.random()-0.5)*3;if(w[m]<0.1)w[m]=0.1}const total=avail.reduce((s,m)=>s+w[m],0);let rand=Math.random()*total;for(const m of avail){rand-=w[m];if(rand<=0)return m}return avail[avail.length-1];}

// ═══ UI ═══
const dom={setup:$('#setup'),phaseTag:$('#phase-tag'),pscore:$('#pscore'),cscore:$('#cscore'),roundInfo:$('#round-info'),playerEgyDisp:$('#player-egy-disp'),enemyEgyDisp:$('#enemy-egy-disp'),resultPop:$('#result-pop'),cardTabs:$('#card-tabs'),cardsRow:$('#cards-row'),overlay:$('#overlay'),overlayBox:$('#overlay-box')};
function rebuildCards(){const moves=getPlayerMoves(),baseK=Object.keys(BASE_MOVES),p2K=Object.keys(PHASE2_BONUS),p3K=Object.keys(PHASE3_BONUS);const hasP2=p2K.some(k=>moves[k]),hasP3=p3K.some(k=>moves[k]);dom.cardTabs.innerHTML='';const tabs=[{id:'base',label:'基础',cls:''}];if(hasP2)tabs.push({id:'p2',label:'P2',cls:'p2tab'});if(hasP3)tabs.push({id:'p3',label:'P3',cls:'p3tab'});if(!tabs.some(t=>t.id===activeTab))activeTab='base';tabs.forEach(t=>{const tb=document.createElement('button');tb.className='ctab '+t.cls+(activeTab===t.id?' on':'');tb.textContent=t.label;tb.addEventListener('click',()=>{activeTab=t.id;movesNeedRebuild=true;rebuildCards()});dom.cardTabs.appendChild(tb)});dom.cardsRow.innerHTML='';const keys=activeTab==='p2'?p2K:activeTab==='p3'?p3K:baseK,src=activeTab==='p2'?PHASE2_BONUS:activeTab==='p3'?PHASE3_BONUS:BASE_MOVES;keys.forEach(name=>{const info=src[name];if(!moves[name])return;const card=document.createElement('button');card.className='card '+info.type+(info.phase===2?' p2card':info.phase===3?' p3card':'');card.dataset.move=name;card.innerHTML='<span class="cicon">'+info.icon+'</span><span class="cname">'+name+'</span><span class="ccost"></span>';card.addEventListener('click',()=>{if(!card.disabled)handleCardClick(name,card)});dom.cardsRow.appendChild(card)});movesNeedRebuild=false;refreshCardStates()}
function refreshCardStates(){if(movesNeedRebuild){rebuildCards();return}const moves=getPlayerMoves();dom.cardsRow.querySelectorAll('.card').forEach(card=>{const name=card.dataset.move,info=moves[name];if(!info)return;const costEl=card.querySelector('.ccost');if(costEl){if(info.chargeCost){const ch=state.playerBingdiaoCharges;if(ch>0){costEl.className='ccharge';costEl.textContent='×'+ch}else{costEl.className='ccost';costEl.textContent='-'+info.chargeCost+'能→'+info.chargesPerPay+'次'}}else{costEl.className='ccost';costEl.textContent=info.type==='charge'?'+1能':info.type==='shield'||info.type==='flyshield'?'免费':'-'+info.cost+'能'}}if(state.awaitingPlayer&&!state.gameOver){if(info.chargeCost)card.disabled=!(state.playerBingdiaoCharges>0||state.playerEnergy>=info.chargeCost);else card.disabled=(info.type==='attack'&&state.playerEnergy<info.cost)}else card.disabled=true})}
function handleCardClick(move,card){playerChoose(move);card.style.transform='scale(0.88)';setTimeout(()=>card.style.transform='',100)}
function updateUI(){dom.pscore.textContent=state.playerScore;dom.cscore.textContent=state.computerScore;if(state.currentPhase===1){dom.phaseTag.textContent='⚔一阶段';dom.phaseTag.className='p1'}else if(state.currentPhase===2){dom.phaseTag.textContent='🌟二阶段';dom.phaseTag.className='p2'}else{dom.phaseTag.textContent='💥三阶段';dom.phaseTag.className='p3'}dom.roundInfo.textContent='第'+state.currentRound+'局·先得'+winsPerPhase+'分胜';dom.playerEgyDisp.textContent='⚡'+state.playerEnergy;dom.enemyEgyDisp.textContent='⚡'+state.computerEnergy;refreshCardStates()}

// ═══ FLOW ═══
function startNewRound(){state.playerEnergy=0;state.computerEnergy=0;state.turnInRound=0;state.awaitingPlayer=true;state.playerMove=null;state.computerMove=null;state.lastResult=null;state.playerBingdiaoCharges=0;state.computerBingdiaoCharges=0;clearAllFx();resetChars();updateUI()}
function endRound(winner){if(winner==='player')state.playerScore++;else state.computerScore++;if(currentPhaseHistory)currentPhaseHistory.rounds.push({number:state.currentRound,winner,playerMove:state.playerMove,computerMove:state.computerMove});updateUI();if(state.playerScore>=winsPerPhase||state.computerScore>=winsPerPhase){if(state.currentPhase===1)setTimeout(()=>startPhase2(),1000);else if(state.currentPhase===2)setTimeout(()=>startPhase3(),1000);else setTimeout(()=>endGame(),1000);return}state.currentRound++;setTimeout(()=>startNewRound(),1600)}
function finalizePhaseHistory(w){if(!currentPhaseHistory)return;currentPhaseHistory.winner=w;currentPhaseHistory.playerScore=state.playerScore;currentPhaseHistory.computerScore=state.computerScore;gameHistory.phases.push(currentPhaseHistory);currentPhaseHistory=null}
function so(t,p,text,b1,f1,b2,f2){dom.overlayBox.innerHTML='<h2>'+t+'</h2><div class="phase-result">'+p+'</div><div class="winner-text">'+text+'</div><button class="btn-primary" id="ov1">'+b1+'</button><button class="btn-secondary" id="ov2">'+b2+'</button>';$('#ov1').addEventListener('click',f1);$('#ov2').addEventListener('click',f2);dom.overlay.classList.remove('hidden')}
function startPhase2(){movesNeedRebuild=true;activeTab='base';const w=state.playerScore>=winsPerPhase?'player':'computer';state.phase1Winner=w;state.phase1PlayerScore=state.playerScore;state.phase1ComputerScore=state.computerScore;finalizePhaseHistory(w);state.currentPhase=2;state.playerScore=0;state.computerScore=0;state.currentRound=1;currentPhaseHistory={number:2,rounds:[],winner:null,playerScore:0,computerScore:0};const wn=w==='player'?'你':'电脑';so('🌟 进入第二阶段！','第一阶段 '+state.phase1PlayerScore+':'+state.phase1ComputerScore,wn+'赢得第一阶段\n获得: 🦄天马 🌟天马流星转转拳','开始',()=>{dom.overlay.classList.add('hidden');startNewRound()},'重开',resetGame);state.awaitingPlayer=false;state.gameOver=false;updateUI()}
function startPhase3(){movesNeedRebuild=true;activeTab='base';const w=state.playerScore>=winsPerPhase?'player':'computer';state.phase2Winner=w;state.phase2PlayerScore=state.playerScore;state.phase2ComputerScore=state.computerScore;finalizePhaseHistory(w);state.currentPhase=3;state.playerScore=0;state.computerScore=0;state.currentRound=1;currentPhaseHistory={number:3,rounds:[],winner:null,playerScore:0,computerScore:0};const wn=w==='player'?'你':'电脑';so('💥 进入第三阶段！','P1:'+state.phase1PlayerScore+':'+state.phase1ComputerScore+' P2:'+state.phase2PlayerScore+':'+state.phase2ComputerScore,wn+'赢得第二阶段\n获得: ❄冰雕 🦅朝翅 ❄🦅冰雕朝翅 💥冰雕朝翅飞 🕊飞飞','开始',()=>{dom.overlay.classList.add('hidden');startNewRound()},'重开',resetGame);state.awaitingPlayer=false;state.gameOver=false;updateUI()}
function endGame(){const w=state.playerScore>=winsPerPhase?'player':'computer';finalizePhaseHistory(w);state.gameOver=true;state.awaitingPlayer=false;updateUI();const pw=w==='player',ap=gameHistory.phases,pW=ap.filter(p=>p.winner==='player').length;so(pw?'🏆 恭喜！最终胜利！':'💫 虽败犹荣',ap.map(p=>'P'+p.number+':'+p.playerScore+'-'+p.computerScore).join(' | '),'你赢了'+pW+'个阶段','再来一局',resetGame,'📊 复盘',showReplay)}
function showReplay(){const ap=gameHistory.phases;let h='<h2>📊 复盘</h2><div style="text-align:center;color:var(--dim);font-size:0.58em">每阶段'+winsPerPhase+'局制</div>';for(const ph of ap){h+='<div class="replay-phase"><h4>'+(ph.number===1?'⚔第一':ph.number===2?'🌟第二':'💥第三')+' ('+(ph.winner==='player'?'你胜':'电脑胜')+' '+ph.playerScore+':'+ph.computerScore+')</h4>';for(const rd of ph.rounds)h+='<div class="replay-round">'+(rd.winner==='player'?'<span class="r-win">✅</span>':'<span class="r-lose">❌</span>')+' R'+rd.number+': '+rd.playerMove+' vs '+rd.computerMove+'</div>';h+='</div>'}const pW=ap.filter(p=>p.winner==='player').length;h+='<div class="replay-final">🏆 '+((pW>ap.length/2)?'你':'电脑')+'获胜 ('+pW+':'+(ap.length-pW)+')</div><div style="text-align:center;margin-top:4px"><button class="btn-primary" id="rpr">再来一局</button> <button class="btn-secondary" id="rpc">关闭</button></div>';dom.overlayBox.innerHTML=h;$('#rpr').addEventListener('click',resetGame);$('#rpc').addEventListener('click',()=>dom.overlay.classList.add('hidden'))}
function resetGame(){movesNeedRebuild=true;activeTab='base';state={currentPhase:1,phase1Winner:null,phase2Winner:null,phase1PlayerScore:0,phase1ComputerScore:0,phase2PlayerScore:0,phase2ComputerScore:0,playerEnergy:0,computerEnergy:0,playerScore:0,computerScore:0,currentRound:1,turnInRound:0,gameOver:false,awaitingPlayer:true,playerMove:null,computerMove:null,lastResult:null,playerBingdiaoCharges:0,computerBingdiaoCharges:0};gameHistory={winsPerPhase,phases:[]};currentPhaseHistory={number:1,rounds:[],winner:null,playerScore:0,computerScore:0};playerHistory=[];aiMood=0.5;dom.overlay.classList.add('hidden');clearAllFx();startNewRound()}
function playerChoose(move){if(!state.awaitingPlayer||state.gameOver)return;const pM=getPlayerMoves(),info=pM[move];if(info.chargeCost){if(!(state.playerBingdiaoCharges>0||state.playerEnergy>=info.chargeCost))return}else if(info.type==='attack'&&state.playerEnergy<info.cost)return;if(info.chargeCost){if(state.playerBingdiaoCharges>0){}else{state.playerEnergy-=info.chargeCost;state.playerBingdiaoCharges=info.chargesPerPay}}state.awaitingPlayer=false;state.playerMove=move;playerHistory.push(move);if(playerHistory.length>30)playerHistory.shift();state.computerMove=aiChoose(state.playerEnergy,state.computerEnergy);const cInfo=getComputerMoves()[state.computerMove];if(cInfo&&cInfo.chargeCost){if(state.computerBingdiaoCharges>0){}else if(state.computerEnergy>=cInfo.chargeCost){state.computerEnergy-=cInfo.chargeCost;state.computerBingdiaoCharges=cInfo.chargesPerPay}}const result=resolveTurn(state.playerMove,state.computerMove);if(info.chargeCost)state.playerBingdiaoCharges--;if(cInfo&&cInfo.chargeCost)state.computerBingdiaoCharges--;state.lastResult=result;state.turnInRound++;state.playerEnergy+=result.playerEnergyDelta;state.computerEnergy+=result.computerEnergyDelta;state.playerEnergy=Math.max(0,state.playerEnergy);state.computerEnergy=Math.max(0,state.computerEnergy);playRound(state.playerMove,state.computerMove,result);updateUI();if(result.playerDefeated||result.computerDefeated){const winner=result.playerDefeated?'computer':'player';if(result.computerDefeated)aiMood=Math.min(1,aiMood+0.15);else aiMood=Math.max(0,aiMood-0.1);setTimeout(()=>endRound(winner),1600)}else{setTimeout(()=>{state.awaitingPlayer=true;state.playerMove=null;state.computerMove=null;updateUI()},1600)}}

// ═══ INIT ═══
rc();resetChars();requestAnimationFrame(loop);
$$('#win-options .win-opt').forEach(b=>b.addEventListener('click',()=>{$$('#win-options .win-opt').forEach(x=>x.classList.remove('sel'));b.classList.add('sel');selectedWins=parseInt(b.dataset.wins)}));
$('#start-game-btn').addEventListener('click',()=>{winsPerPhase=selectedWins;movesNeedRebuild=true;gameHistory.winsPerPhase=winsPerPhase;currentPhaseHistory={number:1,rounds:[],winner:null,playerScore:0,computerScore:0};dom.setup.classList.add('hidden');rc();resetChars();startNewRound()});
$('#rules-btn').addEventListener('click',()=>$('#rules-modal').classList.remove('hidden'));$('#rules-close').addEventListener('click',()=>$('#rules-modal').classList.add('hidden'));$('#rules-modal').addEventListener('click',e=>{if(e.target===$('#rules-modal'))$('#rules-modal').classList.add('hidden')});
document.addEventListener('keydown',e=>{if(!state.awaitingPlayer||state.gameOver)return;const keys={'1':'苍心','2':'护盾','3':'波波','4':'六电','5':'搓搓','6':'八嘎','7':'天马','8':'天马流星转转拳','9':'冰雕','0':'朝翅','-':'冰雕朝翅','=':'冰雕朝翅飞','f':'飞飞'};const move=keys[e.key];if(move&&getPlayerMoves()[move])playerChoose(move)});
window.addEventListener('resize',()=>{rc();resetChars()});
})();
